output_queue_size: 1
cloud_filter_chain:
  - name: CropBoxFilter
    type: point_cloud2_filters/CropBoxFilterPointCloud2
    params:
      active: True
      input_frame: "sick_lidar"
      output_frame: "sick_lidar"
      keep_organized: True
      negative: True
      min_x: -0.71
      max_x: 0.05
      min_y: -0.45
      max_y: 0.45
      min_z: -20.0
      max_z: 20.0

  - name: CropBoxFilter2
    type: point_cloud2_filters/CropBoxFilterPointCloud2
    params:
      active: True
      input_frame: "sick_lidar"
      output_frame: "sick_lidar"
      keep_organized: True
      negative: False
      min_x: -20.0
      max_x: 20.0
      min_y: -20.0
      max_y: 20.0
      min_z: -0.6
      max_z: 3.0

