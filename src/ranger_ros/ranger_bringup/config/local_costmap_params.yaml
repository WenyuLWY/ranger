local_costmap:
  global_frame: map
  robot_base_frame: base_link
  transform_tolerance: 1.0
  update_frequency: 5
  publish_frequency: 5
  rolling_window: true
  width: 5.0
  height: 5.0
  resolution: 0.05
  plugins:
    - name: static_layer
      type: costmap_2d::StaticLayer
    - name: obstacle_layer
      type: costmap_2d::ObstacleLayer