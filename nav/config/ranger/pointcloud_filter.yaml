output_queue_size: 1
cloud_filter_chain:
  - name: remove_robot
    type: point_cloud2_filters/CropBoxFilterPointCloud2
    params:
      active: True
      input_frame: "velodyne"
      output_frame: "velodyne"
      keep_organized: false
      negative: True
      min_x: -1.3
      max_x: 0.1
      min_y: -0.44
      max_y: 0.44
      min_z: -0.5
      max_z: 0.1

