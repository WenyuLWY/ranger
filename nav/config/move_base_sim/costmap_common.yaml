# footprint: [[-0.5, -0.33], [-0.5, 0.33], [0.5, 0.33], [0.5, -0.33]]
# footprint: [[0.58, 0.38], [0.58, -0.38], [-0.58, -0.38], [-0.58, 0.38]]
footprint: [[-0.625, -0.450], [-0.625, 0.450], [0.625, 0.450], [0.625, -0.450]]

footprint_padding: 0.03

robot_base_frame: base_link

transform_tolerance: 0.5
resolution: 0.05

# obstacle_range: 5.5
# raytrace_range: 6.0



#layer definitions
static:
    map_topic: /map
    subscribe_to_updates: false

obstacles_laser:
    observation_sources: laser
    laser: 
        data_type: LaserScan
        clearing: true
        marking: true
        topic: /scan_2d
        inf_is_valid: true
        obstacle_range: 2.5
        raytrace_range: 3.5

obstacle_lidar:
  enabled: true
  observation_sources: lidar_points
  lidar_points:
    sensor_frame: velodyne
    data_type: PointCloud2
    topic: /velodyne_points/filtered
    marking: true
    clearing: true
    max_obstacle_height: 1
    min_obstacle_height: 0.15 
    obstacle_range: 2.5
    raytrace_range: 3.5
    inf_is_valid: false

inflation:
    inflation_radius: 0.55
    cost_scaling_factor: 10.0
