TebLocalPlannerROS:

  odom_topic: odom
  map_frame: map

  # Trajectory
  teb_autosize: True
  dt_ref: 0.30
  dt_hysteresis: 0.10
  max_samples: 500
  global_plan_overwrite_orientation: False  ########################
  allow_init_with_backwards_motion: True
  max_global_plan_lookahead_dist: 4.0 ######################################################################################
  global_plan_viapoint_sep: 0.4
  global_plan_prune_distance: 1.0
  exact_arc_length: False
  feasibility_check_no_poses: 5
  publish_feedback: True

  # Robot
  max_vel_x: 1
  max_vel_x_backwards: 1
  max_vel_y: 0.0
  max_vel_theta: 1
  acc_lim_x: 0.4
  acc_lim_theta: 0.4

  # max_vel_theta: 0.30  调大还是调小
  # acc_lim_theta: 0.30


  min_turning_radius: 0     # 先填一个保守值，后面按实车再调 ##################################################################################
  wheelbase: 0.5             # 这里先填你的前后桥中心距
  cmd_angle_instead_rotvel: False

  footprint_model:
    type: "polygon"
    vertices: [[0.58, 0.38], [0.58, -0.38], [-0.58, -0.38], [-0.58, 0.38]]

  # GoalTolerance
  xy_goal_tolerance: 0.1
  yaw_goal_tolerance: 3.14
  free_goal_vel: True
  complete_global_plan: True

  # Obstacles
  min_obstacle_dist: 0.05
  inflation_dist: 0.40
  include_costmap_obstacles: True
  costmap_obstacles_behind_robot_dist: 1.0
  obstacle_poses_affected: 20
  dynamic_obstacle_inflation_dist: 0.50
  include_dynamic_obstacles: False

  # Optimization
  no_inner_iterations: 5
  no_outer_iterations: 4
  optimization_activate: True
  optimization_verbose: False
  penalty_epsilon: 0.10
  obstacle_cost_exponent: 4.0
  weight_max_vel_x: 2.0
  weight_max_vel_theta: 1.0
  weight_acc_lim_x: 1.0
  weight_acc_lim_theta: 1.0
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 0 ############################################################################################
  weight_kinematics_turning_radius: 80.0
  weight_optimaltime: 1.0
  weight_obstacle: 50.0
  weight_viapoint: 10.0
  weight_adapt_factor: 2.0

  # Homotopy Class Planner
  enable_homotopy_class_planning: False ################################################################################################3
  enable_multithreading: True
  simple_exploration: False
  max_number_classes: 4
  selection_cost_hysteresis: 1.0
  selection_prefer_initial_plan: 0.95
  selection_obst_cost_scale: 1.0
  selection_viapoint_cost_scale: 1.0
  selection_alternative_time_cost: False
  roadmap_graph_no_samples: 15
  roadmap_graph_area_width: 5.0
  h_signature_prescaler: 0.5
  h_signature_threshold: 0.1
  obstacle_heading_threshold: 0.45
  switching_blocking_period: 0.0
  viapoints_all_candidates: True
  delete_detours_backwards: False  ###################################################################
  max_ratio_detours_duration_best_duration: 3.0